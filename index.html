<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>All-in-One PDF Tools</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <link rel="stylesheet" href="style.css" />

  <!-- Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.13.216/pdf.min.js"></script>
  <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>

<header>
  <h1>📄 PDF Solution: All-in-One PDF Tools</h1>
  <p>Merge • Split • PDF -> Image • Image -> PDF</p>
</header>

<div class="container">

  <!-- PDF MERGER -->
  <section class="card">
    <h2>🔗 PDF Merger</h2>
    <input type="file" id="mergePdf1" accept="application/pdf">
    <input type="file" id="mergePdf2" accept="application/pdf">
    <button onclick="mergePDFs()">Merge PDFs</button>
  </section>

  <!-- PDF SPLITTER -->
  <section class="card">
    <h2>✂️ PDF Splitter</h2>
    <input type="file" id="splitPdf" accept="application/pdf">
    <div class="row">
      <input type="number" id="splitStart" placeholder="Start Page" min="1">
      <input type="number" id="splitEnd" placeholder="End Page" min="1">
    </div>
    <button onclick="splitPDF()">Split PDF</button>
    <a id="splitDownload" class="hidden">Download Split PDF</a>
  </section>

  <!-- PDF TO IMAGE -->
  <section class="card">
    <h2>🧾 PDF to Image</h2>
    <input type="file" id="pdfToImageInput" accept="application/pdf">
    <div class="row">
      <input type="number" id="imgStart" placeholder="Start Page">
      <input type="number" id="imgEnd" placeholder="End Page">
    </div>
    <button onclick="downloadPDFImages()">Download Images</button>
  </section>

  <!-- IMAGE TO PDF -->
  <section class="card">
    <h2>🖼️ Image to PDF</h2>
    <input type="file" id="imageInput" accept="image/*" multiple>
    <button onclick="imagesToPDF()">Convert to PDF</button>
  </section>

  <!-- PDF TO TEXT & IMAGES -->
  <section class="card">
    <h2>📄 PDF to Text & Images</h2>
    <input type="file" id="pdfToTextImageInput" accept="application/pdf">
    <button onclick="extractPDFContent()">Extract Content</button>
    <a id="pdfContentDownload" class="hidden">Download ZIP</a>
  </section>

  <!-- PDF TO LATEX -->
  <section class="card">
    <h2>🧮 PDF to LaTeX</h2>
    <input type="file" id="pdfToLatexInput" accept="application/pdf">
    <div class="row">
      <input type="number" id="latexStart" placeholder="Start Page" min="1">
      <input type="number" id="latexEnd" placeholder="End Page" min="1">
    </div>
    <button onclick="convertPDFToLatex()">Generate LaTeX</button>
    <a id="latexDownload" class="hidden">Download LaTeX ZIP</a>
  </section>

</div>

<footer>
  <p>© 2025 Ashikur Rahman Bhuyain</p>
</footer>

<script src="script.js"></script>
</body>
</html>
